<form class="holosuite-hacking-launcher">
  <header class="holosuite-hacking-launcher-header">
    <p>HoloSuite / hacking deck</p>
    <h2>Launch Minigame</h2>
  </header>

  <div class="form-group">
    <label>Minigame</label>
    <select name="minigameType">
      {{#each minigames}}
        <option value="{{id}}">{{title}}</option>
      {{/each}}
    </select>
  </div>

  <div class="form-group">
    <label>Player</label>
    <select name="userId" required>
      {{#each users}}
        <option value="{{id}}">{{name}}</option>
      {{/each}}
    </select>
  </div>

  <div class="form-group">
    <label>Hacker character</label>
    <select name="actorId">
      {{#each actors}}
        <option value="{{id}}">{{name}} ({{ownerNames}})</option>
      {{else}}
        <option value="">Use assigned character</option>
      {{/each}}
    </select>
  </div>

  <div class="form-group">
    <label>Skill</label>
    <select name="skillId" required>
      {{#each skills}}
        <option value="{{id}}" data-skill-label="{{name}}" data-skill-modifier="{{modifier}}">{{label}}</option>
      {{/each}}
    </select>
  </div>

  <div class="form-group">
    <label>DC</label>
    <input type="number" name="dc" value="{{defaultDc}}" step="1" />
  </div>

  <footer class="holosuite-hacking-launcher-actions">
    <button type="button" data-action="test-self"><i class="fa-solid fa-gamepad"></i> Test Yourself</button>
    <button type="submit" data-action="start"><i class="fa-solid fa-paper-plane"></i> Send to Player</button>
  </footer>
</form>
