<form class="holosuite-profile-config">
  <header class="holosuite-profile-config-header">
    <p>HoloSuite / hacking profiles</p>
    <h2>Difficulty Profiles</h2>
  </header>

  <main class="holosuite-profile-config-body">
    {{#each profiles}}
      <section class="holosuite-profile-section" data-profile-section data-profile-id="{{id}}">
        <header class="holosuite-profile-section-header">
          <div>
            <h3>{{label}}</h3>
            <span>{{id}}</span>
          </div>
          <button type="button" data-action="reset-profile" title="Reset this profile" aria-label="Reset {{label}}"><i class="fa-solid fa-rotate-left"></i></button>
        </header>

        <div class="holosuite-profile-grid">
          <label>
            <span title="How long the player has before the trace reaches 100%.">Trace seconds</span>
            <input type="number" name="{{id}}.traceDurationSeconds" value="{{traceDurationSeconds}}" min="5" max="300" step="1" />
          </label>
          <label>
            <span title="How intense the profile's visual distortion is before client visual preference is applied.">Visual glitch</span>
            <input type="number" name="{{id}}.visualGlitchIntensity" value="{{visualGlitchIntensity}}" min="0" max="1" step="0.05" />
          </label>
          <label>
            <span title="Total node count for the generated Node Intrusion map.">Nodes</span>
            <input type="number" name="{{id}}.nodeCount" value="{{nodeIntrusion.nodeCount}}" min="6" max="40" step="1" />
          </label>
          <label>
            <span title="Number of protected routes generated from entry to target. More routes make the puzzle less brittle.">Safe routes</span>
            <input type="number" name="{{id}}.routeCount" value="{{nodeIntrusion.routeCount}}" min="1" max="{{constraints.maxRoutes}}" step="1" />
          </label>
          <label>
            <span title="Hazard nodes that apply a trace penalty. They block side routes unless passable protected firewalls are enabled.">Firewalls</span>
            <input type="number" name="{{id}}.firewallCount" value="{{nodeIntrusion.firewallCount}}" min="0" max="{{constraints.maxFirewalls}}" step="1" />
          </label>
          <label>
            <span title="Dead-end hazard nodes that apply a smaller trace penalty and burn that route.">Decoys</span>
            <input type="number" name="{{id}}.decoyCount" value="{{nodeIntrusion.decoyCount}}" min="0" max="{{constraints.maxDecoys}}" step="1" />
          </label>
          <label>
            <span title="Base time required to claim a normal node.">Takeover seconds</span>
            <input type="number" name="{{id}}.claimDurationSeconds" value="{{nodeIntrusion.claimDurationSeconds}}" min="0.1" max="5" step="0.05" />
          </label>
          <label>
            <span title="Multiplier applied to takeover time when claiming a firewall node.">Firewall takeover x</span>
            <input type="number" name="{{id}}.firewallClaimMultiplier" value="{{nodeIntrusion.firewallClaimMultiplier}}" min="1" max="5" step="0.05" />
          </label>
          <label>
            <span title="Seconds added to trace pressure when a firewall is claimed.">Firewall penalty</span>
            <input type="number" name="{{id}}.firewallPenaltySeconds" value="{{nodeIntrusion.firewallPenaltySeconds}}" min="0" max="60" step="1" />
          </label>
          <label>
            <span title="Seconds added to trace pressure when a decoy is claimed.">Decoy penalty</span>
            <input type="number" name="{{id}}.decoyPenaltySeconds" value="{{nodeIntrusion.decoyPenaltySeconds}}" min="0" max="60" step="1" />
          </label>
        </div>

        <div class="holosuite-profile-limits">
          <span>Max decoys <strong data-constraint="maxDecoys">{{constraints.maxDecoys}}</strong></span>
          <span>Max firewalls <strong data-constraint="maxFirewalls">{{constraints.maxFirewalls}}</strong></span>
          <span>Max safe routes <strong data-constraint="maxRoutes">{{constraints.maxRoutes}}</strong></span>
          <span>Protected nodes <strong data-constraint="protectedNodes">{{constraints.protectedNodes}}</strong></span>
        </div>

        <div class="holosuite-profile-toggles">
          <label>
            <input type="checkbox" name="{{id}}.hintsEnabled" {{#if hintsEnabled}}checked{{/if}} />
            <span title="Shows firewall and decoy node types when they are in view.">Reveal hazard types</span>
          </label>
          <label>
            <input type="checkbox" name="{{id}}.radarEnabled" {{#if nodeIntrusion.radarEnabled}}checked{{/if}} />
            <span title="Shows adjacent danger signals on current, visited, and reachable nodes without revealing exact hazard locations.">Radar</span>
          </label>
          <label>
            <input type="checkbox" name="{{id}}.showTarget" {{#if nodeIntrusion.showTarget}}checked{{/if}} />
            <span title="Shows the target marker before the player reaches it. Intended for critical success by default.">Show target marker</span>
          </label>
          <label>
            <input type="checkbox" name="{{id}}.allowFirewallOnMainPath" {{#if nodeIntrusion.allowFirewallOnMainPath}}checked{{/if}} />
            <span title="Allows firewalls on protected routes. In this mode those firewalls are passable, slower to claim, and apply trace penalties.">Allow passable firewalls on protected routes</span>
          </label>
        </div>
      </section>
    {{/each}}
  </main>

  <footer class="holosuite-profile-config-actions">
    <button type="button" data-action="reset-profiles"><i class="fa-solid fa-rotate-left"></i> Reset Defaults</button>
    <button type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Profiles</button>
  </footer>
</form>
